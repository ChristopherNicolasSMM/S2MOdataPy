# ============================================================================
# GitHub Actions Workflow - Testes Automatizados S2MOdataPy
# ============================================================================
# Autor: Christopher N. S. M. Mauricio
# Descrição: Executa testes em múltiplas versões do Python
# ============================================================================

name: Testar S2MOdataPy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Execução manual

jobs:
  test:
    name: Testes Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    
    steps:
    - name: 🔍 Checkout do código
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -e .
    
    - name: 🧪 Executar testes
      run: |
        pytest tests/ -v --cov=s2modatapy --cov-report=xml
    
    - name: 📊 Upload de cobertura
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: s2modatapy-coverage
        fail_ci_if_error: false

  lint:
    name: Verificação de código (Lint)
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Checkout
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: 📦 Instalar linters
      run: |
        pip install black isort flake8 mypy
    
    - name: ⚫ Verificar formatação Black
      run: black --check s2modatapy/
    
    - name: 📝 Verificar ordenação imports isort
      run: isort --check-only s2modatapy/
    
    - name: 🔍 Verificar com flake8
      run: flake8 s2modatapy/ --max-line-length=88 --extend-ignore=E203