# ============================================================================
# GitHub Actions Workflow - Publicação Automática S2MOdataPy no PyPI
# ============================================================================
# Autor: Christopher N. S. M. Mauricio
# Descrição: Este workflow publica automaticamente a biblioteca no PyPI
#            quando uma nova release é criada no GitHub.
# ============================================================================

name: Publicar S2MOdataPy no PyPI

# ============================================================================
# DISPARADORES (Triggers)
# ============================================================================
# O workflow é executado quando:
# 1. Uma nova release é publicada no GitHub
# 2. Um push é feito na branch main (opcional - comentado)
# 3. Manualmente via GitHub Actions (workflow_dispatch)
# ============================================================================

on:
  # Disparador principal: quando criar uma release
  release:
    types: [published]  # Executa quando a release é publicada
    
  # Disparador manual: permite executar o workflow manualmente
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do pacote (ex: 0.1.0)'
        required: false
        type: string

  # Disparador opcional: executar em pushes para main (descomente se quiser)
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 's2modatapy/**'
  #     - 'pyproject.toml'

# ============================================================================
# PERMISSÕES
# ============================================================================
# Permissões mínimas necessárias para o workflow
# ============================================================================
permissions:
  contents: read
  id-token: write  # Necessário para trusted publishing no PyPI

# ============================================================================
# JOBS (Tarefas)
# ============================================================================
jobs:
  # --------------------------------------------------------------------------
  # JOB 1: Publicar no PyPI
  # --------------------------------------------------------------------------
  publish-pypi:
    name: Publicar pacote no PyPI
    runs-on: ubuntu-latest  # Usa Ubuntu (mais rápido para builds)
    
    # Estratégia de execução
    strategy:
      fail-fast: false  # Continua mesmo se um job falhar
      matrix:
        python-version: ["3.11"]  # Versão do Python para build
    
    steps:
    # Passo 1: Verificar código do repositório
    - name: 🔍 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Busca todo histórico para versão correta
    
    # Passo 2: Configurar Python
    - name: 🐍 Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    # Passo 3: Instalar dependências de build
    - name: 📦 Instalar ferramentas de build
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    # Passo 4: Construir o pacote (wheel + source distribution)
    - name: 🏗️ Construir pacote
      run: |
        python -m build
      env:
        # Garante que o build use UTF-8
        PYTHONIOENCODING: utf-8
    
    # Passo 5: Verificar o pacote antes de publicar
    - name: 🔍 Verificar pacote com twine
      run: |
        twine check dist/*
    
    # Passo 6: Listar arquivos gerados (debug)
    - name: 📋 Listar arquivos gerados
      run: |
        echo "Arquivos em dist/:"
        ls -la dist/
    
    # Passo 7: Publicar no PyPI usando trusted publishing
    - name: ☁️ Publicar no PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # repository-url: https://test.pypi.org/legacy/  # Descomente para TestPyPI
        password: ${{ secrets.PYPI_API_TOKEN }}
        verbose: true
        print-hash: true
        packages-dir: dist/
        verify-metadata: true
        skip-existing: false

  # --------------------------------------------------------------------------
  # JOB 2: Publicar no TestPyPI (ambiente de testes) - OPCIONAL
  # --------------------------------------------------------------------------
  publish-testpypi:
    name: Publicar no TestPyPI (Testes)
    runs-on: ubuntu-latest
    needs: [publish-pypi]  # Executa após o job principal
    if: false  # Desativado por padrão - ative se quiser publicar em ambos
    
    steps:
    - name: 🔍 Checkout do código
      uses: actions/checkout@v4
    
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: 📦 Instalar build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: 🏗️ Construir pacote
      run: python -m build
    
    - name: ☁️ Publicar no TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        verbose: true

  # --------------------------------------------------------------------------
  # JOB 3: Criar release automática no GitHub (opcional)
  # --------------------------------------------------------------------------
  create-github-release:
    name: Criar release no GitHub
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    if: github.event_name == 'workflow_dispatch'  # Apenas manual
    
    steps:
    - name: 📦 Obter versão do pyproject.toml
      id: get_version
      run: |
        VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Versão encontrada: $VERSION"
    
    - name: 🏷️ Criar tag e release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body: |
          ## 📦 S2MOdataPy v${{ steps.get_version.outputs.version }}
          
          ### ✨ Novidades
          - Pacote publicado automaticamente via GitHub Actions
          
          ### 📥 Instalação
          ```bash
          pip install s2modatapy